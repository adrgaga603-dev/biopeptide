<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página no encontrada — BIOFILLERS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --teal:#0D8A6E; --forest:#2B3210; --cream:#FBFBEF; --sand:#E5E2D9; --text:#1C2A1A; --text-soft:#4D5E48; --text-muted:#8E9E88; }
        body { font-family:'Quicksand',sans-serif; background:var(--cream); color:var(--text); min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:2rem; }
        .error-code { font-family:'Cormorant Garamond',serif; font-size:8rem; font-weight:300; color:var(--sand); line-height:1; margin-bottom:1rem; }
        h1 { font-family:'Cormorant Garamond',serif; font-size:2rem; font-weight:400; color:var(--text); margin-bottom:0.75rem; }
        p { font-size:0.9rem; color:var(--text-soft); margin-bottom:2rem; text-align:center; max-width:400px; line-height:1.75; }
        .btn { display:inline-block; background:var(--teal); color:white; text-decoration:none; padding:0.75rem 1.75rem; border-radius:4px; font-family:'Quicksand',sans-serif; font-weight:700; font-size:0.8rem; transition:background 0.2s; }
        .btn:hover { background:#0a7260; }
    </style>
</head>
<body>
    <div class="error-code">404</div>
    <h1>Página no encontrada</h1>
    <p>La página que buscas no existe o fue movida. Regresa al inicio para explorar nuestros artículos y compuestos de investigación.</p>
    <a href="/biopeptide/" class="btn">Volver al inicio</a>
</body>
</html>
